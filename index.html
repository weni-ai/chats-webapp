<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.png" type="image/x-icon" />
    <title>Live desk</title>
    <style>
        /*
         * Standalone-mode baseline. In federation mode the host owns the
         * document and these rules don't apply (this file isn't loaded).
         *
         * Required because postcss-prefixwrap rewrites the original
         * `html, body { height: 100%; margin: 0 }` and the universal `* {
         * box-sizing: border-box }` from `src/styles/{global,reset}.scss`
         * into `.chats-webapp`-scoped rules, which no longer match the
         * `<html>` / `<body>` tags or `#app` itself.
         */
        html, body { height: 100%; margin: 0; }
        *, *::before, *::after { box-sizing: border-box; }
    </style>
</head>

<body>
    <noscript>
        <strong>
            We're sorry but Live desk doesn't work properly without JavaScript
            enabled. Please enable it to continue.
        </strong>
    </noscript>
    <div id="app"></div>
</body>

</html>
